name: Release

# Triggers when you push a tag like v0.2.1 or v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      # 1 — Check out the repo
      - uses: actions/checkout@v4

      # 2 — Strip the leading "v" from the tag to get the version number
      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 3 — Stamp the version and the exact download URL into system.json
      #     (the download URL must point to this specific tag, not "latest",
      #      so FoundryVTT can install older versions correctly)
      - name: Stamp system.json
        run: |
          jq \
            --arg version "${{ steps.ver.outputs.VERSION }}" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/forces.zip" \
            '.version = $version | .download = $download' \
            system.json > system_stamped.json
          mv system_stamped.json system.json

      # 4 — Build the zip (exclude dev-only files)
      - name: Build zip
        run: |
          zip -r forces.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude "docs/*.pdf" \
            --exclude "node_modules/*" \
            --exclude "*.zip"

      # 5 — Create the GitHub release and attach the two required assets:
      #     • system.json  — FoundryVTT reads this to detect updates
      #     • forces.zip   — what actually gets installed
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            system.json
            forces.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
